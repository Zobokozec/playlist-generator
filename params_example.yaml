# Parametry generátoru playlistu
# Povinné: duration_sec
# Runtime: scheduled_start se předává přes --start (nebo zde jako fallback)

# duration_sec: 3600
preset: nedele_rano

# Kvóty: {category_id: {char_id: procento}}
# Kategorie 3 = Jazyk, Kategorie 5 = Nálada
quotas:
  "4":   # Jazyk
    "639": 50   # Čeština
    "667": 35   # Angličtina
    "644": 15   # Slovenština
  #"6":        # Nálada
  #  "45": 50  # Klidná
  #  "46": 30  # Chvály
  #  "47": 20  # Instrumentální

# Soft filtr – podmínky pro zařazení tracku
soft_filter:
  chars:
    "4":                       # Jazyk – povinná kategorie
      exclude: [952,911,732,925,922]   # Pouze tyto jazyky (OR – stačí jeden)
    #"6":                       # Nálada
    #  include: [45, 46, 47, 48]
    "28":                       # časové pouze exclude, bez include = všechny ostatní povoleny
      exclude: [738,693,647,652]      # Vyřaď tracky s tímto obsahem
  duration:
    min: 60    # Minimální délka (s)
    max: 600   # Maximální délka (s)
  year:
    min: 2000  # Nejstarší povolený rok

options:
  output: full   # ids | full | debug
  dry_run: false
